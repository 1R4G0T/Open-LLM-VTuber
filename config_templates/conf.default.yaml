# ========================================================
# CONFIGURAÇÃO EVE (FINALIZADO)
# ========================================================

system_config:
  conf_version: 'v1.2.1'
  host: 'localhost'
  port: 12393
  config_alts_dir: 'characters'
  tool_prompts:
    live2d_expression_prompt: 'live2d_expression_prompt'
    group_conversation_prompt: 'group_conversation_prompt'
    mcp_prompt: 'mcp_prompt'
    proactive_speak_prompt: 'proactive_speak_prompt'

character_config:
  conf_name: 'EVE'
  conf_uid: 'EVE_001'
  live2d_model_name: 'EVE'
  character_name: 'EVE'
  avatar: ''
  human_name: 'Victor'

persona_prompt: |
  Você é a EVE (Educadora Virtual Especializada). Sua personalidade é uma fusão 
  da inteligência analítica de Makise Kurisu e da calma estóica de Frieren. 
  Você é a tutora do Victor, focada em Matemática, Física, Química, História, 
  Filosofia, Psicologia e Raciocínio Lógico.
  Fale de forma madura, pausada e intelectual. Use um vocabulário preciso.
  Seu objetivo é auxiliar nos estudos e projetos de forma lógica.

agent_config:
  conversation_agent_choice: 'basic_memory_agent'
  agent_settings:
    basic_memory_agent:
      llm_provider: 'gemini_llm'
      faster_first_response: True
      segment_method: 'pysbd'
      use_mcpp: True
      mcp_enabled_servers: ["time", "ddg-search"]

llm_configs:
  gemini_llm:
    llm_api_key: 'COLE_AQUI_SUA_API_KEY' # <--- NÃO ESQUEÇA DE COLAR SUA CHAVE AQUI
    model: 'gemini-2.0-flash'
    temperature: 0.7

  ollama_llm:
    base_url: 'http://localhost:11434/v1'
    model: 'qwen2.5:latest'
    temperature: 1.0
    keep_alive: -1
    unload_at_exit: True

asr_config:
  asr_model: 'faster_whisper'
  faster_whisper:
    model_path: 'small'
    language: 'pt'
    device: 'auto'
    compute_type: 'int8'
    prompt: 'Matemática, Física, Química, História, Filosofia, Raciocínio lógico, Psicologia.'

tts_config:
  tts_model: 'edge_tts'
  edge_tts:
    voice: 'pt-BR-FranciscaNeural'
    rate: '1'
    pitch: '0'

vad_config:
  vad_model: 'silero_vad'
  silero_vad:
    orig_sr: 16000
    target_sr: 16000
    prob_threshold: 0.5
    db_threshold: 60
    required_hits: 3
    required_misses: 25
    smoothing_window: 5

tts_preprocessor_config:
  remove_special_char: True
  ignore_brackets: True
  ignore_parentheses: True
  ignore_asterisks: True
  ignore_angle_brackets: True
  translator_config:
    translate_audio: False

live_config:
  bilibili_live:
    room_ids: []
    sessdata: ""
